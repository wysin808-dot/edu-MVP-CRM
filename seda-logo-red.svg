<svg width="730" height="154" viewBox="0 0 730 154" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SEDA International Education Logo - Red Version</title>
  <desc id="desc">A redder vector version of the SEDA International Education logo.</desc>
  <rect width="730" height="154" fill="#ffffff"/>

  <defs>
    <style>
      .brand-red { fill: #c90016; }
      .brand-red-stroke { stroke: #c90016; }
      .brand-gold { fill: #c6923a; }
      .brand-gold-stroke { stroke: #c6923a; }
      .gray { fill: #62676d; }
      .latin {
        font-family: "Montserrat", "Avenir Next", "Helvetica Neue", Arial, sans-serif;
        font-weight: 700;
        letter-spacing: 0;
      }
      .chinese {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-weight: 700;
        letter-spacing: 0;
      }
    </style>
  </defs>

  <g aria-label="SEDA" class="brand-red-stroke" fill="none" stroke-width="10" stroke-linecap="square" stroke-linejoin="miter">
    <path d="M108 44H55C45 44 39 50 39 60C39 70 45 76 55 76H99C111 76 119 84 119 96C119 108 111 116 99 116H39"/>
    <path d="M137 44H202M137 80H193M137 116H202"/>
    <path d="M222 44H267C289 44 306 60 306 80C306 100 289 116 267 116H222V44Z"/>
    <path d="M318 116L356 44L394 116"/>
  </g>
  <polygon class="brand-gold" points="346,105 356,87 366,105"/>

  <line x1="422" y1="29" x2="422" y2="128" class="brand-gold-stroke" stroke-width="2"/>

  <text x="440" y="55" class="brand-red latin" font-size="19.5" textLength="225" lengthAdjust="spacingAndGlyphs">INTERNATIONAL</text>
  <text x="440" y="88" class="brand-red latin" font-size="19.5" textLength="160" lengthAdjust="spacingAndGlyphs">EDUCATION</text>
  <line x1="440" y1="102" x2="708" y2="102" class="brand-gold-stroke" stroke-width="2"/>
  <text x="440" y="128" class="brand-red chinese" font-size="17.5" textLength="230" lengthAdjust="spacingAndGlyphs">新加坡国际教育平台</text>
  <text x="440" y="144" class="gray latin" font-size="9.5" textLength="220" lengthAdjust="spacingAndGlyphs">SINGAPORE EDUCATION PATHWAYS</text>
