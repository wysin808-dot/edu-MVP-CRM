  <rect class="core" x="716" y="872" width="168" height="78" rx="18" ry="18" />
  <text x="800" y="918" class="dim">前室</text>

  <rect class="core" x="896" y="872" width="160" height="78" rx="18" ry="18" />
  <text x="976" y="918" class="dim">女厕</text>

  <rect class="core" x="1068" y="872" width="168" height="78" rx="18" ry="18" />
  <text x="1152" y="918" class="dim">男厕</text>

  <rect class="column" x="448" y="352" width="28" height="28" />
  <rect class="column" x="690" y="180" width="28" height="28" />
  <rect class="column" x="907" y="365" width="28" height="28" />
  <rect class="column" x="1050" y="362" width="28" height="28" />
  <rect class="column" x="1210" y="340" width="28" height="28" />
  <rect class="column" x="760" y="620" width="28" height="28" />
  <rect class="column" x="990" y="620" width="28" height="28" />
  <rect class="column" x="1240" y="644" width="28" height="28" />

  <text x="122" y="1082" class="noteTitle">说明</text>
  <text x="122" y="1114" class="note">1. 本图为概念尺寸图，依据原始平面、现有房间面积和功能重组后的估算尺寸整理。</text>
  <text x="122" y="1142" class="note">2. 尺寸标注以“约”为准，适合做方案沟通、家具容量判断和初步空间分配。</text>
  <text x="122" y="1170" class="note">3. 正式施工前仍需现场复尺，并由 CAD / 室内设计师深化隔墙、门位、机电和消防。</text>
</svg>
