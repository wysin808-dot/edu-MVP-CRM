  <rect class="room zoneB" x="726" y="447" width="180" height="170" rx="18" ry="18" />
  <text x="816" y="506" class="label">教室 5</text>
  <text x="816" y="534" class="dim">约 4.0m x 5.5m</text>
  <text x="816" y="558" class="meta">22㎡ / 10-12 人</text>

  <rect class="room zoneB" x="914" y="447" width="180" height="170" rx="18" ry="18" />
  <text x="1004" y="506" class="label">教室 6</text>
  <text x="1004" y="534" class="dim">约 3.6m x 5.5m</text>
  <text x="1004" y="558" class="meta">20㎡ / 10-12 人</text>

  <rect class="room zoneC" x="1102" y="447" width="145" height="170" rx="18" ry="18" />
