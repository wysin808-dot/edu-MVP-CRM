<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1220" viewBox="0 0 1800 1220">
  <defs>
    <style>
      .bg { fill: #f7f6f1; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #111; }
      .subtitle { font: 500 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #555; }
      .room { fill: #ffffff; stroke: #111; stroke-width: 4; rx: 16; ry: 16; }
      .zoneA { fill: #f4efe4; }
      .zoneB { fill: #edf5fb; }
      .zoneC { fill: #eef6ef; }
      .zoneD { fill: #f8f0f2; }
      .corridor { fill: #eceae3; stroke: #d4d0c3; stroke-width: 2; }
      .core { fill: #e7e7e7; stroke: #111; stroke-width: 3; rx: 16; ry: 16; }
      .outline { fill: none; stroke: #111; stroke-width: 8; }
      .label { font: 700 24px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #111; text-anchor: middle; }
      .dim { font: 600 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #444; text-anchor: middle; }
      .meta { font: 500 14px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #666; text-anchor: middle; }
      .noteTitle { font: 700 18px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #111; }
      .note { font: 500 15px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #444; }
      .wallNote { font: 600 13px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #7b5d20; }
      .column { fill: #9a7731; stroke: #6d531f; stroke-width: 2; rx: 6; ry: 6; }
      .operable { fill: none; stroke: #2d5e9b; stroke-width: 4; stroke-dasharray: 10 8; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1220" />

  <text x="110" y="78" class="title">WACE 培训中心概念尺寸平面图</text>
  <text x="110" y="108" class="subtitle">8 间教室 + 2 个灵活活动区 + 精简办公，柱子建议并入隔墙、柜体或展示位</text>

  <path class="outline" d="M160 150 L1485 195 L1555 980 L275 1020 L180 800 L160 150 Z" />
  <path class="corridor" d="M460 405 L1240 405 L1240 452 L1305 452 L1305 650 L1128 650 L1128 628 L452 628 L452 405 Z" />

  <rect class="room zoneA" x="205" y="190" width="250" height="235" rx="18" ry="18" />
  <text x="330" y="270" class="label">教务 / 教师区</text>
  <text x="330" y="302" class="dim">约 9.7m x 9.1m</text>
  <text x="330" y="328" class="meta">约 88㎡</text>

  <rect class="room zoneA" x="212" y="485" width="235" height="220" rx="18" ry="18" />
  <text x="329" y="565" class="label">前台接待</text>
  <text x="329" y="597" class="dim">约 6.3m x 5.9m</text>
  <text x="329" y="623" class="meta">约 37㎡</text>

