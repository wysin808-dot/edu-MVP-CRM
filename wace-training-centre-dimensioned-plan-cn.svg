  <text x="1174" y="528" class="dim">约 4.0m x 4.7m</text>
  <text x="1174" y="552" class="meta">约 19㎡</text>

  <rect class="room zoneC" x="1256" y="447" width="182" height="170" rx="18" ry="18" />
  <text x="1347" y="500" class="label">自习讨论区</text>
  <text x="1347" y="528" class="dim">约 5.8m x 5.4m</text>
  <text x="1347" y="552" class="meta">约 31㎡</text>

  <rect class="room zoneB" x="488" y="665" width="220" height="180" rx="18" ry="18" />
  <text x="598" y="728" class="label">教室 7</text>
  <text x="598" y="756" class="dim">约 6.1m x 5.0m</text>
  <text x="598" y="780" class="meta">30㎡ / 12-16 人</text>

  <rect class="room zoneB" x="716" y="665" width="220" height="180" rx="18" ry="18" />
  <text x="826" y="728" class="label">教室 8</text>
  <text x="826" y="756" class="dim">约 6.1m x 5.0m</text>
  <text x="826" y="780" class="meta">30㎡ / 12-16 人</text>
  <line x1="716" y1="665" x2="716" y2="845" class="operable" />
  <text x="826" y="870" class="wallNote">可移动隔墙，可合并成大教室</text>

  <rect class="room zoneC" x="944" y="665" width="160" height="180" rx="18" ry="18" />
  <text x="1024" y="724" class="label">学生活动室</text>
  <text x="1024" y="752" class="dim">约 6.0m x 6.7m</text>
  <text x="1024" y="776" class="meta">约 40㎡</text>

  <rect class="room zoneA" x="1112" y="665" width="140" height="180" rx="18" ry="18" />
