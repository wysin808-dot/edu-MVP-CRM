<svg width="820" height="230" viewBox="0 0 820 230" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SEDA PRESS Wordmark</title>
  <desc id="desc">SEDA PRESS academic publishing wordmark set in Libre Baskerville.</desc>
  <style>
    .seda {
      fill: #0B2341;
      font-family: "Libre Baskerville", Baskerville, Georgia, "Times New Roman", serif;
      font-size: 132px;
      font-weight: 400;
      letter-spacing: 46px;
    }
    .press {
      fill: #6B7280;
      font-family: "Libre Baskerville", Baskerville, Georgia, "Times New Roman", serif;
      font-size: 46px;
      font-weight: 400;
      letter-spacing: 35px;
    }
  </style>
  <text id="seda-text" class="seda" x="0" y="116">SEDA</text>
  <line id="left-rule" x1="0" y1="176" x2="112" y2="176" stroke="#6B7280" stroke-width="3"/>
  <text id="press-text" class="press" x="166" y="194">PRESS</text>
  <line id="right-rule" x1="650" y1="176" x2="764" y2="176" stroke="#6B7280" stroke-width="3"/>
</svg>
