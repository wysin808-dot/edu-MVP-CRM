<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080">
  <defs>
    <style>
      .bg { fill: #f7f7f3; }
      .title { font: 700 30px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #101010; }
      .subtitle { font: 500 15px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #555; }
      .room { fill: #ffffff; stroke: #111; stroke-width: 3; rx: 14; ry: 14; }
      .zoneA { fill: #f5f1e8; }
      .zoneB { fill: #eef6fb; }
      .zoneC { fill: #edf5ef; }
      .zoneD { fill: #f8f2f9; }
      .corridor { fill: #ecebe5; stroke: #cfcbbf; stroke-width: 2; }
      .core { fill: #e6e6e6; stroke: #111; stroke-width: 3; }
      .label { font: 700 22px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #111; text-anchor: middle; }
      .small { font: 500 15px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #444; text-anchor: middle; }
      .tiny { font: 500 13px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #5a5a5a; }
      .note { font: 600 14px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #444; }
      .wall-note { font: 600 12px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #7a5e23; }
      .outline { fill: none; stroke: #111; stroke-width: 8; }
      .column { fill: #8c6a2e; stroke: #5f4619; stroke-width: 2; rx: 6; ry: 6; }
      .door { fill: none; stroke: #888; stroke-width: 3; stroke-dasharray: 8 8; }
      .operable { fill: none; stroke: #295d9b; stroke-width: 4; stroke-dasharray: 10 8; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1080" />

  <text x="120" y="78" class="title">WACE Training Centre - Concept Plan</text>
  <text x="120" y="108" class="subtitle">8 classrooms, brighter flexible learning spaces, simplified office ratio, columns wrapped into walls / joinery</text>

  <path class="outline" d="M150 140 L1425 185 L1490 900 L260 940 L175 740 L150 140 Z" />

  <path class="corridor" d="M440 398 L1220 398 L1220 445 L1285 445 L1285 640 L1110 640 L1110 618 L430 618 L430 398 Z" />

  <rect class="room zoneA" x="188" y="175" width="250" height="235" rx="18" ry="18" />
  <text x="313" y="260" class="label">Admin + Teachers</text>
  <text x="313" y="292" class="small">workroom / print / prep</text>

  <rect class="room zoneA" x="195" y="470" width="235" height="220" rx="18" ry="18" />
  <text x="312" y="548" class="label">Reception</text>
  <text x="312" y="580" class="small">front desk + waiting</text>
  <text x="312" y="603" class="small">brand wall / parent lounge</text>

  <rect class="room zoneA" x="260" y="735" width="170" height="135" rx="18" ry="18" />
  <text x="345" y="795" class="label">Store</text>
  <text x="345" y="825" class="small">exam archive</text>

  <rect class="room zoneB" x="470" y="180" width="230" height="210" rx="18" ry="18" />
  <text x="585" y="257" class="label">Classroom 1</text>
  <text x="585" y="289" class="small">18-20 pax</text>

  <rect class="room zoneB" x="708" y="180" width="215" height="210" rx="18" ry="18" />
  <text x="815" y="257" class="label">Classroom 2</text>
  <text x="815" y="289" class="small">16-18 pax</text>

