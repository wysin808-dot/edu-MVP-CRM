<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980">
  <defs>
    <style>
      .bg { fill: #f7f6f1; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #111; }
      .subtitle { font: 500 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #555; }
      .room { fill: #fffdf8; stroke: #111; stroke-width: 6; rx: 18; ry: 18; }
      .board { fill: #eef6fb; stroke: #2f5f7a; stroke-width: 3; rx: 10; ry: 10; }
      .teacher { fill: #f2efe4; stroke: #8a7c58; stroke-width: 3; rx: 12; ry: 12; }
      .desk { fill: #ddeaf4; stroke: #28506a; stroke-width: 3; rx: 12; ry: 12; }
      .cabinet { fill: #ece7d7; stroke: #8a7c58; stroke-width: 3; rx: 10; ry: 10; }
      .door { fill: none; stroke: #888; stroke-width: 4; stroke-dasharray: 9 9; }
      .dim { fill: none; stroke: #666; stroke-width: 2; marker-start: url(#arrow); marker-end: url(#arrow); }
      .dimText { font: 600 18px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #444; }
      .label { font: 700 22px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #111; text-anchor: middle; }
      .small { font: 500 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #4c4c4c; text-anchor: middle; }
      .noteTitle { font: 700 24px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #111; }
      .note { font: 500 18px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #444; }
      .aisle { fill: #f4f4f0; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 5 L 10 0 L 10 10 Z" fill="#666" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="980" />

  <text x="90" y="78" class="title">4m x 8m 教室布置图（16人）</text>
  <text x="90" y="108" class="subtitle">适合 WACE 小班授课，8 张双人桌，前讲台 + 中间主过道，容量可行且不会显得失衡</text>

  <rect class="room" x="120" y="150" width="480" height="760" />

  <line class="dim" x1="120" y1="125" x2="600" y2="125" />
  <text x="360" y="112" class="dimText">4.0m</text>
  <line class="dim" x1="85" y1="150" x2="85" y2="910" />
  <text x="42" y="535" class="dimText" transform="rotate(-90 42 535)">8.0m</text>

  <rect class="board" x="185" y="178" width="350" height="42" />
  <text x="360" y="206" class="small">白板 / 投影幕</text>

  <rect class="teacher" x="265" y="245" width="190" height="72" />
  <text x="360" y="289" class="label">教师区</text>

  <rect class="cabinet" x="155" y="245" width="78" height="72" />
  <text x="194" y="275" class="small">设备柜</text>
  <text x="194" y="296" class="small">或包柱</text>

  <rect class="aisle" x="324" y="343" width="72" height="430" rx="8" ry="8" />
  <text x="360" y="792" class="small">主过道</text>

  <rect class="desk" x="155" y="350" width="132" height="70" />
  <text x="221" y="392" class="small">双人桌 1</text>
  <rect class="desk" x="433" y="350" width="132" height="70" />
  <text x="499" y="392" class="small">双人桌 2</text>

  <rect class="desk" x="155" y="455" width="132" height="70" />
  <text x="221" y="497" class="small">双人桌 3</text>
  <rect class="desk" x="433" y="455" width="132" height="70" />
  <text x="499" y="497" class="small">双人桌 4</text>

  <rect class="desk" x="155" y="560" width="132" height="70" />
  <text x="221" y="602" class="small">双人桌 5</text>
  <rect class="desk" x="433" y="560" width="132" height="70" />
  <text x="499" y="602" class="small">双人桌 6</text>

  <rect class="desk" x="155" y="665" width="132" height="70" />
  <text x="221" y="707" class="small">双人桌 7</text>
  <rect class="desk" x="433" y="665" width="132" height="70" />
  <text x="499" y="707" class="small">双人桌 8</text>

  <rect class="cabinet" x="440" y="790" width="125" height="62" />
  <text x="502" y="828" class="small">后排浅柜</text>

  <path class="door" d="M 156 902 L 156 820 A 82 82 0 0 1 238 902" />
  <text x="244" y="895" class="small">进门</text>

  <line class="dim" x1="640" y1="355" x2="760" y2="355" />
  <text x="700" y="343" class="dimText">约 450mm</text>
  <text x="700" y="376" class="small">侧边走道</text>

  <line class="dim" x1="640" y1="435" x2="760" y2="435" />
  <text x="700" y="423" class="dimText">约 700mm</text>
  <text x="700" y="456" class="small">中间主过道</text>

  <line class="dim" x1="640" y1="515" x2="760" y2="515" />
  <text x="700" y="503" class="dimText">约 1200mm</text>
  <text x="700" y="536" class="small">双人桌宽度</text>

  <line class="dim" x1="640" y1="595" x2="760" y2="595" />
  <text x="700" y="583" class="dimText">前区约 1400mm</text>
  <text x="700" y="616" class="small">白板 + 教师活动区</text>

  <text x="805" y="220" class="noteTitle">布置说明</text>
  <text x="805" y="258" class="note">1. 容量：16 人可行，属于这类教室的合理上限。</text>
  <text x="805" y="294" class="note">2. 桌型：8 张双人桌，建议单桌约 1200 x 600mm。</text>
  <text x="805" y="330" class="note">3. 视线：白板放在 4 米短边，纵深感更自然。</text>
  <text x="805" y="366" class="note">4. 动线：中间主过道保留，老师巡视更顺。</text>
  <text x="805" y="402" class="note">5. 收纳：如有柱子，优先并入前柜或后浅柜处理。</text>
  <text x="805" y="438" class="note">6. 风格：白墙、浅灰地面、浅木柜体，整体会更明亮。</text>

  <text x="805" y="530" class="noteTitle">协调性判断</text>
  <text x="805" y="568" class="note">这间教室不会不协调，但更适合做“精讲小班”。</text>
  <text x="805" y="604" class="note">如果再加厚柜体或柱子占位，就不要继续加座位。</text>
  <text x="805" y="640" class="note">更舒服的区间是 12-14 人，16 人是可落地方案。</text>

  <text x="805" y="732" class="noteTitle">建议控制</text>
  <text x="805" y="770" class="note">门尽量放后侧，避免打断前排教学。</text>
  <text x="805" y="806" class="note">柜深尽量控制在 300-350mm，别吃掉净宽。</text>
  <text x="805" y="842" class="note">不要做过厚讲台，教师桌保持轻薄更好。</text>
  <text x="805" y="878" class="note">如果你要，我下一步可以继续画“包柱版”或“中文版施工沟通版”。</text>
</svg>
