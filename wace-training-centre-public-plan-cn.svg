  <text x="110" y="1110" class="noteTitle">设计调整</text>
  <text x="110" y="1142" class="note">1. 从上一版 8 个偏满的教室，调整为 7 个常规教室 + 1 个可分合研讨室，换取更大的公共学习街、开放讨论区和学生共享空间。</text>
  <text x="110" y="1170" class="note">2. 柱位 C1-C11 已完整标注，建议全部结合隔墙、矮柜、白板或展示柜一起包柱处理。</text>
  <text x="110" y="1198" class="note">3. 电梯门已按你反馈改为朝上开向内侧公共区，避免与上一版方向相反。</text>
