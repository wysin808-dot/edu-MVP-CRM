  <text x="110" y="76" class="title">WACE 培训中心公共空间加强版平面</text>
  <text x="110" y="106" class="subtitle">按原始柱网与核心筒重组：修正电梯开门方向，完整标注柱位与各房间面积，并增加公共学习与活动空间</text>

